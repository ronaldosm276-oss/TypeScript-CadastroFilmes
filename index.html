<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Filmes</title>
    <link rel="stylesheet" href="css/styleFilmes.css">
    <script src="dist/app.js" defer></script>
</head>

<body>
    <div class="cabecalho">

        <img src="images/logo.png" id="logo">
        <h1>AVR <br> Catalógo - Cadastro de Filmes</h1>
        
    </div>

    <form id="form-filme">
        <input type="text" id="titulo" placeholder="Título" required>
        <input type="text" id="diretor" placeholder="Diretor" required>
        <input type="number" id="ano" placeholder="Ano" required>
        <input type="text" id="genero" placeholder="Gênero" required>
        <input type="number" id="avaliacao" placeholder="Avaliação (0-10)" min="0" max="10" step="0.1" required>
        <button type="submit" id="btn-salvar">Cadastrar</button>
    </form>

    <table id="tabela-filmes">
        <thead>
            <tr>
            <tr>Capa</tr>
            <th>Título</th>
            <th>Diretor</th>
            <th>Ano</th>
            <th>Gênero</th>
            <th>Avaliação</th>
            <th>Ações</th>
            </tr>
        </thead>
        <tbody id="corpo-tabela"></tbody>
    </table>


</body>

</html>
